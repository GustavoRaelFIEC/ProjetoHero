$kind: http-request
name: Login
method: POST
url: 'http://localhost:3000/login'
order: 1000
description: 'Autentica um usuário existente. Retorna os dados do usuário em caso de sucesso.'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "senha": "{{senha}}"
    }
